---
# CD (Continuous Deployment)
# Purpose: Unified release pipeline covering Project Verification and Automated Release Orchestration.
# Trigger: Every push to the default branch (main).
# Design:
#   - Sequential execution: Verify -> Release Please.
#   - Atomic: Release only happens if verification passes.
#   - Secure: Eliminates workflow_run risks by using internal job dependencies.

name: "🚀 Continuous Delivery"

"on":
  push:
    branches:
      - "main"
      - "dev"
  workflow_dispatch:

permissions:
  contents: read

env:
  UNIRTM_LOCKED: 1

jobs:
  # 1. Project Verification Stage (Verify)
  verify:
    name: "🏁 Pre-flight Integrity Check (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    environment: development
    concurrency:
      group: verify-${{ github.workflow }}-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
      statuses: write
      security-events: write
    timeout-minutes: 50
    env:
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner"
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.aquasecurity.github.io:443
            *.azurecr.io:443
            *.centos.org:443
            *.debian.org:443
            *.debian.org:80
            *.dkr.ecr.*.amazonaws.com:443
            *.gcr.io:443
            *.githubusercontent.com:443
            *.pkg.dev:443
            *.quay.io:443
            *.redhat.com:443
            *.rockylinux.org:443
            *.sigstore.dev:443
            *.ubuntu.com:443
            *.ubuntu.com:80
            api.github.com:443
            api.osv.dev:443
            api.securityscorecards.dev:443
            auth.docker.io:443
            cdn.deno.land:443
            deno.land:443
            dl-cdn.alpinelinux.org:443
            downloads.gradle-dn.com:443
            downloads.gradle.org:443
            files.pythonhosted.org:443
            formulae.brew.sh:443
            get.trivy.dev:443
            ghcr.io:443
            github.com:443
            index.crates.io:443
            index.docker.io:443
            nodejs.org:443
            oss-fuzz-build-logs.storage.googleapis.com:443
            osv-vulnerabilities.storage.googleapis.com:443
            packages.microsoft.com:443
            packagist.org:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            proxy.golang.org:443
            public.ecr.aws:443
            pypi.org:443
            registry-1.docker.io:443
            registry.npmjs.org:443
            registry.terraform.io:443
            registry.yarnpkg.com:443
            repo.maven.apache.org:443
            repo.yarnpkg.com:443
            rubygems.org:443
            services.gradle.org:443
            static.rust-lang.org:443
            sum.golang.org:443
            www.bestpractices.dev:443
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: "⚡ Setup UniRTM"
        uses: snowdreamtech/setup-unirtm@ea420ef6c856dba7e1a3cf4f38d2fb51e2824e48 # v0.1.15
        with:
          install: true
          trust: true
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
      - name: "📝 Validate Commit Convention (Commitlint)"
        shell: sh
        run: |
          unirtm exec -- commitlint --last --verbose

      - name: "🧪 Execute Full Quality & Safety Verification"
        shell: sh
        run: |
          unirtm run verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUTF8: 1
          TRIVY_CACHE_DIR: .trivycache
          UNIRTM_YES: 1

      - name: "⚡ Cache Documentation Links (Lychee)"
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: ${{ runner.os }}-lychee-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-lychee-

      - name: "🔗 Verify Documentation Links (Lychee)"
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        continue-on-error: true # Don't block CD on link check failures (network issues, rate limits, etc.)
        with:
          args: --config lychee.toml '**/*.md'
          fail: true
        env:
          # Pass GitHub token to avoid rate limiting and access private repos
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🕵️ Detect Vulnerabilities (Trivy FS)"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db"
          TRIVY_CHECKS_BUNDLE_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-checks"
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "1"
          skip-dirs: "unirtm_data,cmd/unirtm_data"

      - name: "📤 Upload Security Audit (SARIF)"
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always() && matrix.os == 'ubuntu-latest'
        with:
          sarif_file: "trivy-results.sarif"

  # 2. Release Orchestration Stage (Release Please)
  release-please:
    name: "🚀 Release Orchestration"
    needs: [verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: internal
    concurrency:
      group: release-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      security-events: write
    timeout-minutes: 50
    steps:
      - name: "📝 Orchestrate Release Lifecycle (Release Please)"
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
          release-type: simple
          config-file: .release-please-config.json
          target-branch: ${{ github.ref_name }}

      - name: "🏗️ Checkout Release PR Branch"
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          persist-credentials: false

      - name: "📦 Setup Node Environment (Syncing)"
        if: ${{ steps.release.outputs.pr && hashFiles('package.json') != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.18.3"
          cache: ""

      - name: "🔗 Synchronize Manifests & Lockfiles"
        if: ${{ steps.release.outputs.pr && hashFiles('package.json') != '' }}
        shell: sh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --no-frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --no-immutable
          elif [ -f "package-lock.json" ]; then
            npm install --package-lock-only
          fi
          git add .
          git commit --signoff -m "chore(release): synchronize lockfiles for version bump" || echo "No changes to sync"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
