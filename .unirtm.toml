
[env]
CONFIG_AUTO_UPDATE = '1'
COREPACK_INTEGRITY_KEYS = '0'
ENABLE_GITHUB_PROXY = '{% if env.CI is defined %}0{% else %}1{% endif %}'
GITHUB_PROXY = 'https://gh-proxy.sn0wdr1am.com/'
GONOSUMDB = ''
GOPRIVATE = ''
GOPROXY = '{% if env.CI is defined %}https://proxy.golang.org,direct{% else %}https://goproxy.cn,direct{% endif %}'
GOSUMDB = '{% if env.CI is defined %}sum.golang.org{% else %}sum.golang.google.cn{% endif %}'
NODEJS_ORG_MIRROR = '{% if env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}'
NPM_CONFIG_REGISTRY = '{% if env.CI is defined %}https://registry.npmjs.org{% else %}https://registry.npmmirror.com{% endif %}'
PIP_INDEX_URL = '{% if env.CI is defined %}https://pypi.org/simple{% else %}https://mirrors.aliyun.com/pypi/simple{% endif %}'
PIP_TRUSTED_HOST = '{% if env.CI is defined %}pypi.org{% else %}mirrors.aliyun.com{% endif %}'
PYTHONUTF8 = '1'
PYTHON_BUILD_MIRROR_URL = '{% if env.CI is defined %}https://www.python.org/ftp/python/{% else %}https://mirrors.aliyun.com/python/{% endif %}'
RUBY_BUILD_MIRROR_URL = '{% if env.CI is defined %}https://cache.ruby-lang.org/pub/ruby/{% else %}https://mirrors.aliyun.com/ruby-build/{% endif %}'
RUSTUP_DIST_SERVER = '{% if env.CI is defined %}https://static.rust-lang.org{% else %}https://mirrors.aliyun.com/rustup{% endif %}'
RUSTUP_UPDATE_ROOT = '{% if env.CI is defined %}https://static.rust-lang.org/rustup{% else %}https://mirrors.aliyun.com/rustup/rustup{% endif %}'
UNIRTM_DISABLE_AQUA = '1'
UNIRTM_GO_DOWNLOAD_MIRROR = '{% if env.CI is defined %}https://dl.google.com/go/{% else %}https://mirrors.aliyun.com/golang/{% endif %}'
UNIRTM_GO_SKIP_CHECKSUM = '{% if env.CI is defined %}0{% else %}1{% endif %}'
UNIRTM_NODE_COMPILE = '{% if env.ALPINE_VERSION is defined %}false{% endif %}'
UNIRTM_NODE_FLAVOR = '{% if env.ALPINE_VERSION is defined %}musl{% endif %}'
UNIRTM_NODE_MIRROR_URL = '{% if env.ALPINE_VERSION is defined %}https://unofficial-builds.nodejs.org/download/release/{% elif env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}'

[settings]
cache_dir = ''
cache_ttl = 86400
jobs = 0
data_dir = ''

[tasks]
[tasks.audit]
description = 'Run comprehensive security audit (parallelized)'
run = '''
# Run all audit subchecks in parallel and wait for them to finish
unirtm run audit:gitleaks &
unirtm run audit:zizmor &
unirtm run audit:osv &
unirtm run audit:npm &
unirtm run audit:pip &
unirtm run audit:govulncheck &
unirtm run audit:trivy &
wait
'''

[tasks."audit:gitleaks"]
description = 'Scan for hardcoded secrets'
run = 'gitleaks detect --source . --no-banner'

[tasks."audit:zizmor"]
description = 'Audit GitHub Actions workflows for security flaws'
run = '''
CMD="zizmor . --format plain --config .zizmor.yml"
if [ "$UNIRTM_FIX" = "1" ]; then
    CMD="$CMD --fix=all"
fi
$CMD
'''

[tasks."audit:osv"]
description = 'Generic vulnerability scan across lockfiles'
run = 'osv-scanner scan . --config .osv-scanner.toml'

[tasks."audit:npm"]
description = 'Node.js dependency audit'
run = '''
CMD="npm audit"
if [ "$UNIRTM_FIX" = "1" ]; then
    CMD="npm audit fix"
fi
if [ -f "package.json" ]; then
    $CMD --registry="https://registry.npmjs.org"
else
    echo "⏭️  Skipped (no package.json)"
fi
'''

[tasks."audit:pip"]
description = 'Python dependency audit'
run = '''
CMD="pip-audit"
if [ "$UNIRTM_FIX" = "1" ]; then
    CMD="pip-audit --fix"
fi
if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
    $CMD
else
    echo "⏭️  Skipped (no python requirements)"
fi
'''

[tasks."audit:govulncheck"]
description = 'Go dependency audit'
run = '''
if [ -f "go.mod" ]; then
    govulncheck ./...
else
    echo "⏭️  Skipped (no go.mod)"
fi
'''

[tasks."audit:trivy"]
description = 'Generate and scan SBOM using Trivy'
run = '''
trivy fs --format cyclonedx --output sbom.json .
trivy sbom sbom.json
'''

[tasks.lint]
description = 'Fast lint: Check only modified files (staged & unstaged)'
run = '''
FILES=$(git ls-files -m -o --exclude-standard)
if [ -z "$FILES" ]; then
    echo "✨ No changed files to lint."
else
    pre-commit run --files $FILES || (echo "⚠️  First pass failed. Running second check..." && pre-commit run --files $FILES)
fi
'''

[tasks.lint-all]
description = 'Full lint: Check all project files (used in CI or verify)'
run = 'pre-commit run --all-files || (echo "⚠️  First pass failed. Running second check..." && pre-commit run --all-files)'

[tasks.test]
description = 'Run Go unit tests for all packages recursively'
run = 'go test -race -v ./...'
output = 'interleaved'
env = { GOTOOLCHAIN = 'local' }

[tasks.verify]
description = 'Run full local verification (lint-all, test, audit) - runs subchecks in parallel'
run = '''
# Run the three verification subtasks in parallel and wait for them to finish
unirtm run lint-all &
unirtm run test &
unirtm run audit &
wait
'''

