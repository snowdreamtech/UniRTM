# UniRTM configuration
# Generated by 'unirtm migrate' — review before use

[tools]
'github:astral-sh/ruff' = '0.15.12'
'github:checkmake/checkmake' = 'v0.3.2'
'github:cli/cli' = '2.92.0'
'github:dotenv-linter/dotenv-linter' = '4.0.0'
'github:editorconfig-checker/editorconfig-checker' = '3.6.1'
'github:gitleaks/gitleaks' = '8.30.1'
'github:google/addlicense' = '1.2.0'
'github:google/osv-scanner' = '2.3.5'
'github:hadolint/hadolint' = '2.14.0'
'github:koalaman/shellcheck' = '0.11.0'
'github:mvdan/sh' = '3.13.1'
'github:rhysd/actionlint' = '1.7.12'
'github:zizmorcore/zizmor' = '1.24.1'
'github:anchore/syft' = '1.44.0'

go = '1.26.2'
node = '26.1.0'
'npm:@commitlint/cli' = '20.5.3'
'npm:@commitlint/config-conventional' = '20.5.3'
'npm:@taplo/cli' = '0.7.0'
'npm:bats' = '1.13.0'
'npm:commitizen' = '4.3.1'
'npm:cz-conventional-changelog' = '3.3.0'
'npm:dockerfile-utils' = '0.16.3'
'npm:eslint' = '10.3.0'
'npm:markdownlint-cli2' = '0.22.1'
'npm:pnpm' = '11.0.4'
'npm:prettier' = '3.8.3'
'npm:sort-package-json' = '3.6.1'
'npm:stylelint' = '17.10.0'
'pipx:clang-format' = '22.1.4'
'pipx:pre-commit' = '4.6.0'
'pipx:yamllint' = '1.37.1'
python = '3.14.4'

[env]
CONFIG_AUTO_UPDATE = '1'
COREPACK_INTEGRITY_KEYS = '0'
ENABLE_GITHUB_PROXY = '{% if env.CI is defined %}0{% else %}1{% endif %}'
GITHUB_PROXY = 'https://gh-proxy.sn0wdr1am.com/'
GOPROXY = '{% if env.CI is defined %}https://proxy.golang.org,direct{% else %}https://mirrors.aliyun.com/goproxy/,direct{% endif %}'
GOSUMDB = '{% if env.CI is defined %}sum.golang.org{% else %}sum.golang.google.cn{% endif %}'
GONOSUMDB = ''
GOPRIVATE = ''
NODEJS_ORG_MIRROR = '{% if env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}'
NPM_CONFIG_REGISTRY = '{% if env.CI is defined %}https://registry.npmjs.org{% else %}https://registry.npmmirror.com{% endif %}'
PIP_INDEX_URL = '{% if env.CI is defined %}https://pypi.org/simple{% else %}https://mirrors.aliyun.com/pypi/simple{% endif %}'
PIP_TRUSTED_HOST = '{% if env.CI is defined %}pypi.org{% else %}mirrors.aliyun.com{% endif %}'
PYTHONUTF8 = '1'
PYTHON_BUILD_MIRROR_URL = '{% if env.CI is defined %}https://www.python.org/ftp/python/{% else %}https://mirrors.aliyun.com/python/{% endif %}'
RUBY_BUILD_MIRROR_URL = '{% if env.CI is defined %}https://cache.ruby-lang.org/pub/ruby/{% else %}https://mirrors.aliyun.com/ruby-build/{% endif %}'
RUSTUP_DIST_SERVER = '{% if env.CI is defined %}https://static.rust-lang.org{% else %}https://mirrors.aliyun.com/rustup{% endif %}'
RUSTUP_UPDATE_ROOT = '{% if env.CI is defined %}https://static.rust-lang.org/rustup{% else %}https://mirrors.aliyun.com/rustup/rustup{% endif %}'
UNIRTM_DISABLE_AQUA = '1'
UNIRTM_GO_DOWNLOAD_MIRROR = '{% if env.CI is defined %}https://dl.google.com/go/{% else %}https://mirrors.aliyun.com/golang/{% endif %}'
UNIRTM_GO_SKIP_CHECKSUM = '{% if env.CI is defined %}0{% else %}1{% endif %}'
UNIRTM_NODE_COMPILE = '{% if env.ALPINE_VERSION is defined %}false{% endif %}'
UNIRTM_NODE_FLAVOR = '{% if env.ALPINE_VERSION is defined %}musl{% endif %}'
UNIRTM_NODE_MIRROR_URL = '{% if env.ALPINE_VERSION is defined %}https://unofficial-builds.nodejs.org/download/release/{% elif env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}'

[settings]
cache_dir = ''
data_dir = ''
cache_ttl = 86400
concurrency = 0

[tasks]
[tasks.init]
description = "Hydrate project from template (rename placeholders)"
run = "sh scripts/init-project.sh"

[tasks.setup]
description = "Install system-level development tools"
run = "sh scripts/setup.sh"

[tasks.install]
description = "Install project-level dependencies (pip, npm)"
depends = ["setup"]
run = "sh scripts/install.sh"

[tasks.lint]
description = "Run standardized linter (pre-commit)"
run = "sh scripts/lint.sh"

[tasks.precommit]
description = "Alias for lint (Run pre-commit hooks)"
depends = ["lint"]
run = "echo 'Pre-commit checks passed!'"

[tasks.format]
description = "Auto-format code (ruff, prettier, shfmt, etc.)"
run = "sh scripts/format.sh"

[tasks.test]
description = "Run unified test suite"
run = "sh scripts/test.sh"

[tasks.build]
description = "Build project artifacts"
run = "sh scripts/build.sh"

[tasks.commit]
description = "Start the interactive Commitizen CLI"
run = "sh scripts/commit.sh"

[tasks.verify]
description = "Run full local verification (env, lint, test, audit)"
run = "sh scripts/verify.sh"

[tasks.release]
description = "Standardized release manager (versioning & tagging)"
run = "sh scripts/release.sh"

[tasks.env]
description = "Environment configuration manager (.env)"
run = "sh scripts/env.sh"

[tasks.update-tools]
description = "Upgrade UniRTM-managed tool versions"
run = "sh scripts/update-tools.sh"

[tasks.update]
description = "Update all tools, dependencies, and hooks"
run = "sh scripts/update.sh"

[tasks.audit]
description = "Run security audit and vulnerability scans"
run = "sh scripts/audit.sh"

[tasks.health]
description = "Generate unified project health dashboard"
run = "sh scripts/health.sh"

[tasks.bench]
description = "Run performance benchmarks"
run = "sh scripts/bench.sh"

[tasks.sync-docs]
description = "Synchronize documentation between versions"
run = "sh scripts/sync-docs.sh"

[tasks.docs]
description = "Documentation site manager (dev/build/preview)"
run = "sh scripts/docs.sh"

[tasks.gen-dependabot]
description = "Auto-generate dependabot.yml from detected ecosystems"
run = "sh scripts/gen-dependabot.sh"

[tasks.sync-labels]
description = "Synchronize and brand repository labels"
run = "sh scripts/sync-labels.sh"

[tasks.sync-harden-runner]
description = "Synchronize Harden Runner endpoints to all workflow files"
run = "sh scripts/sync-harden-runner.sh"

[tasks.sync-lock]
description = "Synchronize and verify the unirtm.lock file across all platforms"
run = "sh scripts/sync-lock.sh"

[tasks.archive-changelog]
description = "Archive major-version changelog entries"
run = "sh scripts/archive-changelog.sh"

[tasks.check-env]
description = "Onboarding environment health check"
run = "sh scripts/check-env.sh"

[tasks.clean]
description = "Remove temporary and generated files"
run = "sh scripts/cleanup.sh"

[tasks.license-add]
description = "Add license headers to core source files (Safe Mode)"
run = "addlicense -v -f .github/license-header.txt $(find src pkg internal cmd scripts tests \\( -path '*/vendor/*' -o -path '*/node_modules/*' -o -path '*/dist/*' -o -path '*/build/*' \\) -prune -o -type f \\( -name '*.go' -o -name '*.sh' -o -name '*.py' \\) -print 2>/dev/null)"

[tasks.license-check]
description = "Check for missing license headers"
run = "addlicense -check -v -f .github/license-header.txt $(find src pkg internal cmd scripts tests \\( -path '*/vendor/*' -o -path '*/node_modules/*' -o -path '*/dist/*' -o -path '*/build/*' \\) -prune -o -type f \\( -name '*.go' -o -name '*.sh' -o -name '*.py' \\) -print 2>/dev/null)"
